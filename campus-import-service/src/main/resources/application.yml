server:
  port: 8085

spring:
  application:
    name: campus-import-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB
  datasource:
    url: ${IMPORT_DB_URL:jdbc:mysql://localhost:3306/campusmind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${IMPORT_DB_USERNAME}
    password: ${IMPORT_DB_PASSWORD}
  data:
    mongodb:
      uri: ${IMPORT_MONGO_URI}
      auto-index-creation: true
    redis:
      host: ${IMPORT_REDIS_HOST:localhost}
      port: ${IMPORT_REDIS_PORT:6379}
      password: ${IMPORT_REDIS_PASSWORD:}
      database: ${IMPORT_REDIS_DATABASE:8}

# Feign 集成 Sentinel 熔断降级
feign:
  sentinel:
    enabled: true

campus:
  auth:
    jwt:
      issuer: ${AUTH_JWT_ISSUER:campusmind-auth}
      secret: ${AUTH_JWT_SECRET}
  import:
    # Feign 客户端超时配置（通过 Nacos 服务发现路由，不再需要硬编码 baseUrl）
    ai-connect-timeout-seconds: 5
    ai-read-timeout-seconds: 30
    rain-cookie-ttl-minutes: 10
    rain-cookie-enabled: ${IMPORT_RAIN_COOKIE_ENABLED:false}
    max-rain-json-bytes: 8388608
    raw-document-retention-days: 7
    max-text-length: 20000
    max-image-bytes: 5242880
    max-file-bytes: 10485760
    # 雨课堂同步会分批发送多条导入请求，10 次/分钟过低会导致后续批次全部
    # 被拒。提高到 60 次/分钟，同时 Flutter 端分批间加延时 + 429 重试。
    rate-limit-per-minute: 60
    tessdata-path: ${TESSDATA_PATH:C:/Program Files/Tesseract-OCR/tessdata}
    ocr-language: ${OCR_LANGUAGE:chi_sim+eng}
    xju-ehall:
      enabled: ${XJU_EHALL_ENABLED:false}
      login-url: ${XJU_EHALL_LOGIN_URL:https://ehall.xju.edu.cn/new/index.html}
      auth-hosts:
        - authserver.xju.edu.cn
        - ehall.xju.edu.cn
      data-hosts: ${XJU_EHALL_DATA_HOSTS:}
      schema-version: 1
      policy-version: ${XJU_EHALL_POLICY_VERSION:2026-07-18-v1}
      max-payload-bytes: 2097152
      max-source-items: 500
      max-expanded-events: 800
      collected-at-skew-minutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0

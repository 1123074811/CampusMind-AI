server:
  port: 8084

spring:
  application:
    name: campus-feed-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  datasource:
    url: ${FEED_DB_URL:jdbc:mysql://localhost:3306/campusmind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${FEED_DB_USERNAME}
    password: ${FEED_DB_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0

campus:
  feed:
    source-subscription-weight: ${FEED_SOURCE_SUBSCRIPTION_WEIGHT:100}
    reminder-check-interval-ms: ${FEED_REMINDER_CHECK_INTERVAL_MS:60000}
    push-webhook-url: ${FEED_PUSH_WEBHOOK_URL:}

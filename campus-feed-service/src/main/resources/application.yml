server:
  port: 8084

spring:
  application:
    name: campus-feed-service
  datasource:
    url: ${FEED_DB_URL:jdbc:mysql://localhost:3306/campusmind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${FEED_DB_USERNAME}
    password: ${FEED_DB_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,info

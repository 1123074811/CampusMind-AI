spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: jdbc:h2:mem:campus_crawler;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

campus:
  ai:
    extract-url: http://127.0.0.1:1/api/v1/ai/cognition/extract
    backfill-initial-delay-ms: 3600000
  crawler:
    user-agent: "CampusEventBot/1.0 (+contact: admin@example.edu)"
    min-interval-seconds: 3

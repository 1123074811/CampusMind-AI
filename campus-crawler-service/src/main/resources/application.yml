server:
  port: 8086

spring:
  application:
    name: campus-crawler-service
  datasource:
    url: ${CRAWLER_DB_URL:jdbc:mysql://localhost:3306/campusmind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${CRAWLER_DB_USERNAME}
    password: ${CRAWLER_DB_PASSWORD}

campus:
  crawler:
    default-interval-seconds: 5
    min-interval-seconds: 3
    robots-cache-ttl-hours: 12
    max-retry: 3
    max-pages-per-source: ${CRAWLER_MAX_PAGES_PER_SOURCE:5}
    daily-cron: ${CRAWLER_DAILY_CRON:0 30 6 * * *}
    user-agent: "CampusEventBot/1.0 (+contact: admin@example.edu)"
    backoff:
      initial-seconds: 30
      multiplier: 2.0
      max-seconds: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8086

spring:
  application:
    name: campus-crawler-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  datasource:
    url: ${CRAWLER_DB_URL:jdbc:mysql://localhost:3306/campusmind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${CRAWLER_DB_USERNAME}
    password: ${CRAWLER_DB_PASSWORD}

campus:
  ai:
    extract-url: ${CAMPUS_AI_EXTRACT_URL:http://localhost:8089/api/v1/ai/cognition/extract}
    # 默认拒绝规则抽取结果，避免把原文或规则产物伪装成 AI 智能摘要。
    require-llm: ${CAMPUS_AI_REQUIRE_LLM:true}
    prompt-version: ${CAMPUS_AI_PROMPT_VERSION:llm-v1}
    backfill-initial-delay-ms: ${CAMPUS_AI_BACKFILL_INITIAL_DELAY_MS:10000}
    backfill-delay-ms: ${CAMPUS_AI_BACKFILL_DELAY_MS:60000}
  crawler:
    default-interval-seconds: 5
    min-interval-seconds: 3
    startup-delay-ms: ${CRAWLER_STARTUP_DELAY_MS:15000}
    startup-repeat-delay-ms: ${CRAWLER_STARTUP_REPEAT_DELAY_MS:315360000000}
    robots-cache-ttl-hours: 12
    max-retry: 3
    hourly-cron: ${CRAWLER_HOURLY_CRON:0 0 * * * *}
    user-agent: "CampusEventBot/1.0 (+contact: admin@example.edu)"
    backoff:
      initial-seconds: 30
      multiplier: 2.0
      max-seconds: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    container_name: campusmind-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campusmind}
      MYSQL_USER: ${MYSQL_USERNAME:-campusmind}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_DOCKER_PORT:-13306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7.4
    container_name: campusmind-redis
    ports:
      - "${REDIS_DOCKER_PORT:-16379}:6379"
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:8.0
    container_name: campusmind-mongo
    ports:
      - "${MONGO_DOCKER_PORT:-27018}:27017"
    volumes:
      - mongo-data:/data/db

  postgres:
    image: pgvector/pgvector:pg17
    container_name: campusmind-pgvector
    environment:
      POSTGRES_DB: campusmind_vector
      POSTGRES_USER: ${PGVECTOR_USERNAME:-campusmind}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:?PGVECTOR_PASSWORD is required}
      TZ: Asia/Shanghai
    ports:
      - "${PGVECTOR_DOCKER_PORT:-15432}:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  nacos:
    image: ${NACOS_IMAGE:-nacos/nacos-server:v2.4.3}
    container_name: campusmind-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data

volumes:
  mysql-data:
  redis-data:
  mongo-data:
  pgvector-data:
  nacos-data:

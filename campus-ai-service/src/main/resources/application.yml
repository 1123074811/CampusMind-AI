server:
  port: 8089

spring:
  application:
    name: campus-ai-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  data:
    redis:
      host: ${AI_REDIS_HOST:localhost}
      port: ${AI_REDIS_PORT:6379}
      password: ${AI_REDIS_PASSWORD:}
      database: ${AI_REDIS_DATABASE:0}
  autoconfigure:
    exclude:
      # rule 模式默认不启用 LLM/向量库/数据源/Mongo，避免本地开发依赖
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration
  ai:
    model:
      chat: ${SPRING_AI_CHAT_MODEL:none}
      embedding: ${SPRING_AI_EMBEDDING_MODEL:none}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.deepseek.com}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:deepseek-chat}
          temperature: ${OPENAI_TEMPERATURE:0.2}

campus:
  ai:
    # rule=规则版Agent+内存向量库(默认,零外部依赖)；llm=Spring AI ChatModel+PGVector(需激活 llm profile)
    mode: ${CAMPUS_AI_MODE:rule}
    model-version: ${CAMPUS_AI_MODEL_VERSION:${OPENAI_CHAT_MODEL:rule-v1}}
    prompt-version: ${CAMPUS_AI_PROMPT_VERSION:rule-v1}
    rag:
      # 不同 embedding 模型的分数分布不同，保留环境变量用于实测校准。
      min-score: ${CAMPUS_AI_RAG_MIN_SCORE:0.05}
    web-search:
      enabled: ${CAMPUS_AI_WEB_SEARCH_ENABLED:true}
      base-url: ${TAVILY_BASE_URL:https://api.tavily.com}
      api-key: ${TAVILY_API_KEY:}
      max-results: ${CAMPUS_AI_WEB_SEARCH_MAX_RESULTS:5}
    memory:
      short-term-ttl: ${CAMPUS_AI_SHORT_TERM_MEMORY_TTL:PT24H}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0

# 真实持久化向量检索：与 llm profile 一起启用，且 pg 放在最后。
# Embedding 使用支持中文的多语言 ONNX Transformer，首次运行会下载并缓存真实模型。
# --spring.profiles.active=llm,pg
campus:
  ai:
    vector-store: pg

spring:
  datasource:
    url: ${PGVECTOR_URL:jdbc:postgresql://localhost:5432/campusmind_vector}
    username: ${PGVECTOR_USERNAME:campusmind}
    password: ${PGVECTOR_PASSWORD}
  ai:
    model:
      embedding: transformers
    embedding:
      transformer:
        cache:
          directory: ${TRANSFORMER_CACHE_DIR:${user.home}/.campusmind/models}
        onnx:
          model-uri: ${TRANSFORMER_MODEL_URI:https://huggingface.co/sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2/resolve/e8f8c211226b894fcb81acc59f3b34ba3efd5f42/onnx/model.onnx}
        tokenizer:
          uri: ${TRANSFORMER_TOKENIZER_URI:https://huggingface.co/sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2/resolve/e8f8c211226b894fcb81acc59f3b34ba3efd5f42/tokenizer.json}
    vectorstore:
      pgvector:
        table-name: campus_ai_vectors
        id-type: text
        dimensions: 384
        initialize-schema: true
        schema-validation: true
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

server:
  port: 8080

spring:
  application:
    name: campus-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: campus-auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**
            - id: campus-user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/users/**
            - id: campus-event-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/events/**
            - id: campus-feed-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/feed/**
            - id: campus-import-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/import/**
            - id: campus-crawler-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/admin/crawler/**
            - id: campus-audit-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/admin/**
            - id: campus-search-service
              uri: http://localhost:8088
              predicates:
                - Path=/api/v1/search/**
            - id: campus-ai-service
              uri: http://localhost:8089
              predicates:
                - Path=/api/v1/ai/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

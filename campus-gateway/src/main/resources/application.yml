server:
  port: 8080

spring:
  application:
    name: campus-gateway
  http:
    codecs:
      max-in-memory-size: 15MB
  data:
    redis:
      host: ${GATEWAY_REDIS_HOST:localhost}
      port: ${GATEWAY_REDIS_PORT:6379}
      password: ${GATEWAY_REDIS_PASSWORD:}
      database: ${GATEWAY_REDIS_DATABASE:0}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
    gateway:
      server:
        webflux:
          routes:
            - id: campus-auth-service
              uri: lb://campus-auth-service
              predicates:
                - Path=/api/v1/auth/**
            - id: campus-auth-sso-service
              uri: lb://campus-auth-service
              predicates:
                - Path=/oauth2/**,/login/oauth2/**
            - id: campus-user-service
              uri: lb://campus-user-service
              predicates:
                - Path=/api/v1/users/**
            - id: campus-event-service
              uri: lb://campus-event-service
              predicates:
                - Path=/api/v1/events/**
            - id: campus-feed-service
              uri: lb://campus-feed-service
              predicates:
                - Path=/api/v1/feed/**
            - id: campus-feed-information-route
              uri: lb://campus-feed-service
              predicates:
                - Path=/api/v1/information/**
            - id: campus-import-service
              uri: lb://campus-import-service
              predicates:
                - Path=/api/v1/import/**
            - id: campus-crawler-service
              uri: lb://campus-crawler-service
              predicates:
                - Path=/api/admin/crawler/**
            - id: campus-audit-service
              uri: lb://campus-audit-service
              predicates:
                - Path=/api/admin/**
            - id: campus-search-service
              uri: lb://campus-search-service
              predicates:
                - Path=/api/v1/search/**
            - id: campus-ai-service
              uri: lb://campus-ai-service
              predicates:
                - Path=/api/v1/ai/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0

campus:
  auth:
    jwt:
      issuer: ${AUTH_JWT_ISSUER:campusmind-auth}
      secret: ${AUTH_JWT_SECRET}
  security:
    public-paths:
      - /api/v1/auth/login
      - /api/v1/auth/refresh
      - /api/v1/auth/logout
      - /api/v1/auth/register
      - /api/v1/auth/password/forgot
      - /api/v1/auth/password/reset
      - /api/v1/auth/web/login
      - /api/v1/auth/web/refresh
      - /api/v1/auth/web/logout
      - /api/v1/auth/sso
      - /oauth2/
      - /login/oauth2/
      - /actuator/health
      - /actuator/info
    # 网关层限流配置（基于 Redis 令牌桶，按 IP 维度）
    rate-limit:
      enabled: ${GATEWAY_RATE_LIMIT_ENABLED:true}
      capacity: 50
      refill-tokens-per-second: 10

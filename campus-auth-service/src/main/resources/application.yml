server:
  port: 8081

spring:
  application:
    name: campus-auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/campusmind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${AUTH_DB_USERNAME:campusmind}
    password: ${AUTH_DB_PASSWORD:campusmind}

campus:
  auth:
    jwt:
      issuer: ${AUTH_JWT_ISSUER:campusmind-auth}
      secret: ${AUTH_JWT_SECRET:please-change-this-secret-to-at-least-32-bytes}
      access-token-ttl-minutes: ${AUTH_JWT_ACCESS_TTL_MINUTES:120}

management:
  endpoints:
    web:
      exposure:
        include: health,info

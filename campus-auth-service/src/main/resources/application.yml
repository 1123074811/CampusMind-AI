server:
  port: 8081

spring:
  application:
    name: campus-auth-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/campusmind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${AUTH_DB_USERNAME}
    password: ${AUTH_DB_PASSWORD}
  data:
    redis:
      host: ${AUTH_REDIS_HOST:localhost}
      port: ${AUTH_REDIS_PORT:6379}
      password: ${AUTH_REDIS_PASSWORD:}
      database: ${AUTH_REDIS_DATABASE:0}

campus:
  auth:
    jwt:
      issuer: ${AUTH_JWT_ISSUER:campusmind-auth}
      secret: ${AUTH_JWT_SECRET}
      access-token-ttl-minutes: ${AUTH_JWT_ACCESS_TTL_MINUTES:15}
      refresh-token-ttl-days: ${AUTH_JWT_REFRESH_TTL_DAYS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0

server:
  port: 8083

spring:
  application:
    name: campus-event-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  datasource:
    url: ${EVENT_DB_URL:jdbc:mysql://localhost:3306/campusmind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${EVENT_DB_USERNAME}
    password: ${EVENT_DB_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0

campus:
  internal:
    ai-service-url: ${AI_SERVICE_URL:http://localhost:8089}

server:
  port: 8082

spring:
  application:
    name: campus-user-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  datasource:
    url: ${USER_DB_URL:jdbc:mysql://localhost:3306/campusmind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${USER_DB_USERNAME}
    password: ${USER_DB_PASSWORD}
  data:
    redis:
      host: ${USER_REDIS_HOST:localhost}
      port: ${USER_REDIS_PORT:6379}
      password: ${USER_REDIS_PASSWORD:}
      database: ${USER_REDIS_DATABASE:0}

campus:
  auth:
    jwt:
      issuer: ${AUTH_JWT_ISSUER:campusmind-auth}
      secret: ${AUTH_JWT_SECRET}
  privacy:
    policy-version: ${PRIVACY_POLICY_VERSION:2026-07-01}
    retention-days: ${PRIVACY_RETENTION_DAYS:365}
    cleanup-cron: ${PRIVACY_CLEANUP_CRON:0 20 3 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0

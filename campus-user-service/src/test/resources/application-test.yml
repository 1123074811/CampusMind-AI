spring:
  datasource:
    url: jdbc:h2:mem:campus_user;MODE=MySQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

campus:
  auth:
    jwt:
      issuer: campusmind-auth-test
      secret: test-secret-key-with-at-least-32-bytes

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

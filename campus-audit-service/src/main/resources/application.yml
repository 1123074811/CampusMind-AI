server:
  port: 8087

spring:
  application:
    name: campus-audit-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  datasource:
    url: ${AUDIT_DB_URL:jdbc:mysql://localhost:3306/campusmind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${AUDIT_DB_USERNAME}
    password: ${AUDIT_DB_PASSWORD}

campus:
  auth:
    jwt:
      issuer: ${AUTH_JWT_ISSUER:campusmind-auth}
      secret: ${AUTH_JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn --batch-mode test package

  admin-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: campus-admin-web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: campus-admin-web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: campus-flutter-app
    steps:
      - uses: actions/checkout@v6
      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: latest
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan tracked production files for high-confidence secrets
        shell: bash
        run: |
          if git grep -nEI '(-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----|AKIA[0-9A-Z]{16}|gh[pousr]_[A-Za-z0-9]{36,}|sk-[A-Za-z0-9]{20,})' -- ':!**/src/test/**' ':!**/test/**' ':!.env.example' ':!docs/**'; then
            echo '检测到疑似真实密钥，请改用环境变量。'
            exit 1
          fi
      - uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'
